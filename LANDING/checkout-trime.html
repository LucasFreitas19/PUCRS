<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Seguro | Índice</title>
    
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS e FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Nossos Estilos -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="checkout.css">
</head>
<body>

    <!-- Header Simples -->
    <header class="bg-white shadow-sm py-3 mb-4">
        <div class="container text-center">
            <a href="landing.html">
                <img src="../Logos/LOGO INDICE-02.png" alt="Logo Índice" height="45" style="filter: invert(1);"> <!-- Invert para ficar escura -->
            </a>
        </div>
    </header>

    <div class="container checkout-container">
        <div class="row g-5">
            
            <!-- LADO DIREITO: RESUMO DO PEDIDO -->
            <div class="col-md-5 col-lg-4 order-md-last">
                <div class="resumo-pedido shadow-lg">
                    <h5 class="fw-bold mb-4 d-flex justify-content-between align-items-center">
                        <span>Seu Carrinho</span>
                        <i class="fas fa-shopping-cart text-principal"></i>
                    </h5>
                    
                    <div class="d-flex justify-content-between lh-sm mb-3">
                        <div>
                            <!-- SE FOR SEMESTRAL OU ANUAL, ALTERE O TEXTO E O VALOR AQUI -->
                            <h6 class="my-0 fw-bold">Assinatura Semestral</h6>
                            <small class="text-muted">Acesso online completo</small>
                        </div>
                        <span class="fw-bold text-nowrap">R$ 215,00</span>
                    </div>

                    <div class="divider"></div>
                    
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted">Subtotal</span>
                        <span>R$ 215,00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3 text-success">
                        <span>Desconto Promocional</span>
                        <span class="text-nowrap">- R$ 0,00</span>
                    </div>
                    
                    <div class="divider"></div>

                    <div class="d-flex justify-content-between align-items-center">
                        <strong class="fs-5">Total</strong>
                        <strong class="fs-4 text-principal">R$ 215,00</strong>
                    </div>
                </div>
                
                <div class="text-center mt-4 opacity-75">
                    <i class="fas fa-lock me-2"></i><small>Ambiente 100% Seguro</small>
                </div>
            </div>

            <!-- LADO ESQUERDO: FORMULÁRIO FAKE -->
            <div class="col-md-7 col-lg-8">
                <div class="card-checkout">
                    <h4 class="mb-4 fw-bold text-escura">Finalizar Inscrição</h4>
                    
                    <form id="form-pagamento">
                        <h5 class="fw-bold mb-3 mt-4 text-principal fs-6">1. Seus Dados</h5>
                        <div class="row g-3">
                            <div class="col-sm-6">
                                <label class="form-label fw-medium">Nome</label>
                                <input type="text" class="form-control" placeholder="Ex: João" required>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label fw-medium">Sobrenome</label>
                                <input type="text" class="form-control" placeholder="Ex: Silva" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-medium">Email</label>
                                <input type="email" class="form-control" placeholder="seu@email.com" required>
                            </div>
                        </div>

                        <hr class="my-4">

                        <h5 class="fw-bold mb-3 mt-4 text-principal fs-6">2. Pagamento</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Nome no Cartão</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Número do Cartão</label>
                                <input type="text" class="form-control" placeholder="0000 0000 0000 0000" maxlength="19" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Validade (MM/AA)</label>
                                <input type="text" class="form-control" placeholder="12/30" maxlength="5" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">CVV</label>
                                <input type="text" class="form-control" placeholder="123" maxlength="3" required>
                            </div>
                        </div>

                        <hr class="my-4">

                        <button class="w-100 btn-pagar shadow-sm" type="submit" id="btn-pagar">
                            Assinar e Acessar o Clube
                        </button>
                    </form>
                </div>
            </div>
            
        </div>
    </div>

    <script src="checkout.js"></script>
</body>
</html>
